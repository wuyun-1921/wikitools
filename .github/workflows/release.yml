name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../wikitools-${{ matrix.target }}.tar.gz wikitools
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../wikitools-${{ matrix.target }}.zip wikitools.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: wikitools-${{ matrix.target }}
          path: wikitools-${{ matrix.target }}.*

  dictionary:
    runs-on: ubuntu-latest
    name: Build EN-ZH dictionary
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build wikitools
        run: cargo build --release

      - name: Install dictzip
        run: sudo apt-get install -y dictd

      - name: Get dump date for cache key
        id: dump-meta
        run: |
          DATE=$(curl -sL https://dumps.wikimedia.org/wikidatawiki/latest/ | grep 'wb_items_per_site.sql.gz' | grep -oP '\d{2}-[A-Z][a-z]{2}-\d{4}' | head -1)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Dump date: $DATE"

      - name: Restore cached dump
        id: cache-dump
        uses: actions/cache@v4
        with:
          path: ~/.cache/wikitools
          key: wikitools-wikidata-${{ steps.dump-meta.outputs.date }}
          restore-keys: |
            wikitools-wikidata-

      - name: Generate pair dictionary
        run: ./target/release/wikitools pair en zh --download

      - name: Bundle pair dictionary (DSL + MDX)
        run: |
          # DSL
          DSL_DZ=$(ls wikipedia-titlepair-en-zh-*.dsl.dz | head -1)
          BASE="${DSL_DZ%.dsl.dz}"
          tar czf "${BASE}-dsl.tar.gz" "$DSL_DZ" assets/wikidata.ico
          echo "  ${BASE}-dsl.tar.gz"
          # MDX conversion
          dictzip -d "$DSL_DZ"
          pip install mdict-utils
          DSL="${DSL_DZ%.dz}"
          python scripts/dsl2mdx.py "$DSL" -t "wikipedia titlepair (en-zh)"
          MDX="${DSL%.dsl}.mdx"
          tar czf "${BASE}-mdx.tar.gz" "$MDX" assets/wikidata.ico
          echo "  ${BASE}-mdx.tar.gz"
          dictzip "$DSL"

      - name: Generate titles dictionaries (MDX + JS)
        run: |
          for LANG in en zh; do
            ./target/release/wikitools titles $LANG --download
            # Bundle MDX + JS + icon per language
            MDX=$(ls wikipedia-titles-${LANG}-*.mdx | head -1)
            JS="wikipedia-titles-${LANG}.js"
            BASE="${MDX%.mdx}"
            tar czf "${BASE}-mdx.tar.gz" "$MDX" "$JS" assets/wikidata.ico
            echo "  ${BASE}-mdx.tar.gz"
          done

      - name: Upload dictionary artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dictionary
          path: |
            wikipedia-titlepair-en-zh-*.tar.gz
            wikipedia-titles-*.tar.gz

  release:
    needs: [build, dictionary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            wikitools-*.tar.gz
            wikitools-*.zip
            wikipedia-titlepair-*.tar.gz
            wikipedia-titles-*.tar.gz
