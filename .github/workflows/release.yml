name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../wikititlepair-${{ matrix.target }}.tar.gz wikititlepair
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../wikititlepair-${{ matrix.target }}.zip wikititlepair.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: wikititlepair-${{ matrix.target }}
          path: wikititlepair-${{ matrix.target }}.*

  dictionary:
    runs-on: ubuntu-latest
    name: Build EN-ZH dictionary
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build wikititlepair
        run: cargo build --release

      - name: Install dictzip
        run: sudo apt-get install -y dictd

      - name: Get dump date for cache key
        id: dump-meta
        run: |
          DATE=$(curl -sL https://dumps.wikimedia.org/wikidatawiki/latest/ | grep -oP '\d{2}-[A-Z][a-z]{2}-\d{4}' | head -1)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Dump date: $DATE"

      - name: Restore cached dump
        id: cache-dump
        uses: actions/cache@v4
        with:
          path: ~/.cache/wikidict
          key: wikidata-dump-${{ steps.dump-meta.outputs.date }}
          restore-keys: |
            wikidata-dump-

      - name: Download Wikidata dump
        if: steps.cache-dump.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/wikidict
          curl -L -o ~/.cache/wikidict/wikidatawiki-latest-wb_items_per_site.sql.gz \
            https://dumps.wikimedia.org/wikidatawiki/latest/wikidatawiki-latest-wb_items_per_site.sql.gz

      - name: Generate dictionary
        run: ./target/release/wikititlepair en zh

      - name: Convert to MDX
        run: |
          pip install mdict-utils
          python scripts/dsl2mdx.py wikipedia-titlepair-en-zh-*.dsl -t "wikipedia titlepair (en-zh)"

      - name: Bundle dictionaries with icon
        run: |
          ICON=assets/wikidata.ico
          for FMT in dsl mdx; do
            if [ "$FMT" = "dsl" ]; then
              DICT=$(ls wikipedia-titlepair-en-zh-*.dsl.dz | head -1)
              BASE="${DICT%.dsl.dz}"
            else
              DICT=$(ls wikipedia-titlepair-en-zh-*.mdx | head -1)
              BASE="${DICT%.mdx}"
            fi
            tar czf "${BASE}-${FMT}.tar.gz" "$DICT" "$ICON"
            echo "  ${BASE}-${FMT}.tar.gz"
          done

      - name: Upload dictionary artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dictionary
          path: |
            wikipedia-titlepair-en-zh-*.tar.gz

  release:
    needs: [build, dictionary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            wikititlepair-*.tar.gz
            wikititlepair-*.zip
            wikipedia-titlepair-*.tar.gz
