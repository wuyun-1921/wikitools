name: Update Dictionary

on:
  schedule:
    # Run on 1st of every odd month (Jan, Mar, May, Jul, Sep, Nov)
    - cron: '0 0 1 1,3,5,7,9,11 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get remote dump date
        id: dump-date
        run: |
          DATE=$(curl -s https://dumps.wikimedia.org/wikidatawiki/latest/ | grep -o '[0-9][0-9]-[A-Z][a-z][a-z]-[0-9][0-9][0-9][0-9]' | head -1)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Remote dump date: $DATE"

      - name: Get last release date
        id: last-release
        run: |
          LAST_RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "none")
          echo "tag=$LAST_RELEASE" >> $GITHUB_OUTPUT
          
          if [ "$LAST_RELEASE" != "none" ]; then
            # Extract date from release assets
            ASSETS=$(gh release view "$LAST_RELEASE" --json assets --jq '.assets[].name')
            DICT_DATE=$(echo "$ASSETS" | grep -o '[0-9]\{8\}' | head -1)
            echo "dict_date=$DICT_DATE" >> $GITHUB_OUTPUT
            echo "Last release: $LAST_RELEASE, dict date: $DICT_DATE"
          else
            echo "dict_date=none" >> $GITHUB_OUTPUT
            echo "No previous release"
          fi

      - name: Check if update needed
        id: check
        run: |
          REMOTE_DATE="${{ steps.dump-date.outputs.date }}"
          LAST_DICT="${{ steps.last-release.outputs.dict_date }}"
          
          # Convert remote date (03-Jun-2026) to YYYYMMDD
          REMOTE_YMD=$(echo "$REMOTE_DATE" | awk '{
            split($0, a, "-");
            day = a[1];
            mon = a[2];
            year = a[3];
            if (mon == "Jan") m = "01";
            else if (mon == "Feb") m = "02";
            else if (mon == "Mar") m = "03";
            else if (mon == "Apr") m = "04";
            else if (mon == "May") m = "05";
            else if (mon == "Jun") m = "06";
            else if (mon == "Jul") m = "07";
            else if (mon == "Aug") m = "08";
            else if (mon == "Sep") m = "09";
            else if (mon == "Oct") m = "10";
            else if (mon == "Nov") m = "11";
            else if (mon == "Dec") m = "12";
            print year m day;
          }')
          
          echo "Remote YYYYMMDD: $REMOTE_YMD"
          echo "Last dict YYYYMMDD: $LAST_DICT"
          
          if [ "$REMOTE_YMD" = "$LAST_DICT" ]; then
            echo "update=false" >> $GITHUB_OUTPUT
            echo "No update needed - dictionary is current"
          else
            echo "update=true" >> $GITHUB_OUTPUT
            echo "Update needed - new dump available"
          fi

      - name: Build binary (if needed)
        if: steps.check.outputs.update == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        if: steps.check.outputs.update == 'true'
        run: cargo build --release

      - name: Install dictzip
        if: steps.check.outputs.update == 'true'
        run: sudo apt-get install -y dictd

      - name: Download Wikidata dump
        if: steps.check.outputs.update == 'true'
        run: |
          mkdir -p ~/.cache/wikidict
          curl -L -o ~/.cache/wikidict/wikidatawiki-latest-wb_items_per_site.sql.gz \
            https://dumps.wikimedia.org/wikidatawiki/latest/wikidatawiki-latest-wb_items_per_site.sql.gz

      - name: Generate dictionary
        if: steps.check.outputs.update == 'true'
        run: ./target/release/wikititlepair en zh --download

      - name: Upload dictionary artifact
        if: steps.check.outputs.update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dictionary
          path: wikipedia-titlepair-en-zh-*.dsl*

      - name: Release dictionary
        if: steps.check.outputs.update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: v0.1.0
          body: |
            ## Dictionary Update
            
            Wikidata dump updated to ${{ steps.dump-date.outputs.date }}.
            
            Includes updated **English ↔ Chinese** bi-directional dictionary.
          files: |
            wikipedia-titlepair-*.dsl*
          append_body: true
